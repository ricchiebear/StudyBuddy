services:

  web:
    build:
      context: ./
    volumes:
      - .:/src
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: mysql
    restart: always
    env_file:
      - ./.env
    ports:
      - "3308:3308"
    volumes:
      - ./src/mysql:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    env_file:
      - ./.env
    ports:
      - "8081:80"